name: End-to-End Artifact Flow

on:
  workflow_dispatch:
    inputs:
      release-tag:
        description: "Release tag (e.g. 0.0.1)"
        required: true
      path:
        description: "Download + commit path (e.g. reports)"
        required: true
        default: "reports"

permissions:
  contents: write

jobs:
  flow:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1️⃣ Create files
      - name: Create files
        run: |
          mkdir -p output
          echo '{"name":"file3"}' > output/file3.json
          echo '{"name":"file3"}' > output/file3.json
          echo "# File 3" > output/file4.md
          echo "# File 4" > output/file4.md

      # 2️⃣ Upload artifact
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: my-artifacts
          path: output/*

      # 3️⃣ Download artifact to user-provided path
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: my-artifacts
          path: ${{ inputs.path }}

      # Debug
      - name: List downloaded files
        run: |
          echo "📂 Files in ${{ inputs.path }}:"
          ls -l ${{ inputs.path }}

      # 4️⃣ Commit to main
      - name: Commit files to main
        run: |
          set -e

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git checkout main

          git add ${{ inputs.path }}

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add artifacts to ${{ inputs.path }}"
            git push origin main
          fi

      # 5️⃣ Upload to release
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.release-tag }}"
          FILE_PATH="${{ inputs.path }}"

          echo "📦 Uploading files from '$FILE_PATH' to release '$TAG'..."

          max_retries=3
          count=1
          
          while [ $count -le $max_retries ]; do
            echo "⬆️ Attempt $count to upload..."
          
            if gh release upload "$TAG" "$FILE_PATH"/* --clobber; then
              echo "✅ Upload successful"
              break
            else
              echo "⚠️ Upload failed (attempt $count)"
              ((count++))
              sleep 2
            fi
          done
          
          if [ $count -gt $max_retries ]; then
            echo "❌ Upload failed after $max_retries attempts"
            exit 1
          fi
