name: Reports → Commit → Release

on:
  workflow_dispatch:
    inputs:
      release-tag:
        description: "Release tag (e.g. 0.0.1)"
        required: true
      path:
        description: "Reports path"
        required: true
        default: "reports"

permissions:
  contents: write

jobs:
  flow:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1️⃣ Create files (demo)
      - name: Create files
        run: |
          mkdir -p output
          echo '{"name":"file1"}' > output/file1.json
          echo '{"name":"file2"}' > output/file2.json
          echo "# File 1" > output/file1.md
          echo "# File 2" > output/file2.md

      # 2️⃣ Upload artifact
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: my-artifacts
          path: output/*

      # 3️⃣ Download into input path
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: my-artifacts
          path: downloaded

    

      # 5️⃣ Commit ONLY if reports changed
      - name: Commit reports if changed
        run: |
          TARGET="${{ inputs.path }}"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git checkout main

          git add "$TARGET"

          if git diff --cached --quiet -- "$TARGET"; then
            echo "✅ No changes in $TARGET → skipping commit"
          else
            git commit -m "Update $TARGET for ${{ inputs.release-tag }}"
            git push origin main
            echo "✅ Changes committed"
          fi

      # 6️⃣ Upload to release
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.release-tag }}"
          TARGET="${{ inputs.path }}"

          echo "📦 Uploading from $TARGET to release $TAG"

          # Validate release exists
          gh release view "$TAG" >/dev/null 2>&1 || {
            echo "❌ Release not found"
            exit 1
          }

          # Upload all files
          gh release upload "$TAG" "$TARGET"/* --clobber

          echo "✅ Upload completed"
