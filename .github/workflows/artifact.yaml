name: Upload Artifacts to Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # Create sample files
      - name: Create files
        run: |
          mkdir -p output
          echo '{"name":"file1"}' > output/file1.json
          echo '{"name":"file2"}' > output/file2.json
          echo "# File 1" > output/file1.md
          echo "# File 2" > output/file2.md

      # Upload artifact (optional step for testing flow)
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: my-artifacts
          path: output/*

      # Download artifact into reports/
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: my-artifacts
          path: reports

      # Debug: check files
      - name: List files
        run: |
          echo "📂 Reports folder:"
          ls -l reports/

      # 🚀 Upload to GitHub Release
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "📦 Uploading files to release 0.0.1..."

          gh release view 0.0.1 || { echo "❌ Release 0.0.1 not found"; exit 1; }

          gh release upload "0.0.1" reports/* --clobber

          echo "✅ Upload completed"
