name: End-to-End Artifact Flow (Replace Reports)

on:
  workflow_dispatch:
    inputs:
      release-tag:
        description: "Release tag (e.g. 0.0.1)"
        required: true
      path:
        description: "Reports path"
        required: true
        default: "reports"

permissions:
  contents: write

jobs:
  flow:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1️⃣ Create new files
      - name: Create files
        run: |
          mkdir -p output
          echo '{"name":"file5"}' > output/file3.json
          echo '{"name":"file6"}' > output/file4.json
          echo "# File 5" > output/file3.md
          echo "# File 6" > output/file4.md

      # 2️⃣ Upload artifact
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: my-artifacts
          path: output/*

      # 3️⃣ Download artifacts to temp folder
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: my-artifacts
          path: downloaded

      # 🔥 4️⃣ FULL REPLACEMENT LOGIC
      - name: Replace reports folder completely
        run: |
          TARGET="${{ inputs.path }}"

          mkdir -p "$TARGET"

          echo "🧹 Removing old files..."
          rm -rf "$TARGET"/*

          echo "📥 Copying new files..."
          cp -r downloaded/* "$TARGET"/

          echo "📂 Final reports content:"
          ls -l "$TARGET"

      # 5️⃣ Commit changes (includes deletions)
      - name: Commit to main
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git checkout main

          git add "${{ inputs.path }}"

          if git diff --cached --quiet -- "${{ inputs.path }}"; then
            echo "No changes in reports"
          else
            git commit -m "Replace reports for ${{ inputs.release-tag }}"
            git push origin main
          fi

      # 6️⃣ Upload to release
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.release-tag }}"
          FILE_PATH="${{ inputs.path }}"

          echo "📦 Uploading files to release $TAG..."

          for i in 1 2 3; do
            if gh release upload "$TAG" "$FILE_PATH"/* --clobber; then
              echo "✅ Upload successful"
              exit 0
            else
              echo "⚠️ Retry $i..."
              sleep 2
            fi
          done

          echo "❌ Upload failed"
          exit 1
